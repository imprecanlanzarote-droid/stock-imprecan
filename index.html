<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpreCan Stock & Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .tab-active { background: #0f172a; color: white; font-weight: 600; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .tab-inactive:hover { background: #e2e8f0; }
        .btn-primary { background: #0f172a; color: white; padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
    </style>
</head>
<body class="pb-24">

<div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
    <div class="w-10 h-10 border-4 border-slate-100 border-t-slate-800 rounded-full animate-spin"></div>
    <p class="mt-4 font-semibold text-slate-500 text-sm">Sincronizando datos...</p>
</div>

<div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">ImpreCan Business</h1>
            <p class="text-slate-500 text-sm mt-1">Control de inventario y rentabilidad</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <button onclick="showModal('brand')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm"><i class="fas fa-plus mr-2 text-slate-400"></i>Marca</button>
            <button onclick="showModal('garment')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm"><i class="fas fa-plus mr-2 text-slate-400"></i>Tipo</button>
            <button onclick="showModal('model')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm"><i class="fas fa-plus mr-2 text-slate-400"></i>Modelo</button>
            <button onclick="showModal('variant')" class="btn-primary text-xs shadow-md shadow-slate-200"><i class="fas fa-tag mr-2"></i>Nueva Variante</button>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
        <div class="card p-4">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Unidades Stock</p>
            <p id="stat-total" class="text-2xl font-black mt-1">0</p>
        </div>
        <div class="card p-4 bg-amber-50 border-amber-100">
            <p class="text-[10px] text-amber-600 font-bold uppercase tracking-wider">Agotados (0 uds)</p>
            <p id="stat-low" class="text-2xl font-black mt-1 text-amber-700">0</p>
        </div>
        <div class="card p-4">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Inversión (Coste)</p>
            <p id="stat-investment" class="text-2xl font-black mt-1 text-slate-700">0€</p>
        </div>
        <div class="card p-4 bg-green-50 border-green-100">
            <p class="text-[10px] text-green-600 font-bold uppercase tracking-wider">Beneficio Potencial</p>
            <p id="stat-profit" class="text-2xl font-black mt-1 text-green-700">0€</p>
        </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4 mb-6">
        <div class="bg-slate-100 p-1 rounded-2xl flex md:w-1/3">
            <button onclick="switchTab('stock')" id="tab-stock" class="flex-1 py-2 text-sm rounded-xl tab-active transition-all">Stock</button>
            <button onclick="switchTab('pending')" id="tab-pending" class="flex-1 py-2 text-sm rounded-xl tab-inactive transition-all">Por Pedir</button>
            <button onclick="switchTab('ordered')" id="tab-ordered" class="flex-1 py-2 text-sm rounded-xl tab-inactive transition-all">Ya Pedidos</button>
        </div>
        
        <div class="flex gap-2 flex-1">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3.5 top-3 text-slate-400"></i>
                <input id="search-box" type="text" placeholder="Buscar modelo, código, color..." class="w-full border border-slate-200 pl-10 p-2.5 rounded-xl text-sm font-semibold text-slate-700 shadow-sm focus:outline-none focus:border-slate-400" onkeyup="render()">
            </div>
            <button onclick="toggleViewMode()" class="bg-white border border-slate-200 px-4 rounded-xl text-slate-600 hover:text-slate-900 hover:bg-slate-50 shadow-sm transition-colors" title="Cambiar Vista">
                <i id="view-icon" class="fas fa-list"></i>
            </button>
        </div>
    </div>

    <div id="content-area" class="space-y-4"></div>
</div>

<div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-[200] p-4">
    <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-5">
            <h3 id="modal-title" class="text-lg font-bold text-slate-800"></h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
        </div>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="closeModal()" class="text-sm font-semibold text-slate-500 hover:text-slate-800 px-2">Cancelar</button>
            <button id="modal-btn" class="bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors">Guardar</button>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCiesjFpko52HogjrAHiFS7SMaSwSLfNuo",
        authDomain: "stock-imprecan.firebaseapp.com",
        databaseURL: "https://stock-imprecan-default-rtdb.firebaseio.com",
        projectId: "stock-imprecan",
        storageBucket: "stock-imprecan.appspot.com",
        messagingSenderId: "313112425492",
        appId: "1:313112425492:web:068c6a7f3bc10ec9d4a301"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let appData = {};
    let currentTab = 'stock';
    let expanded = { brands: {}, cats: {}, models: {} };
    let isListView = false;

    // --- ORDENACIÓN DE VARIANTES ---
    const sizeOrder = {"XXS":1, "XS":2, "S":3, "M":4, "L":5, "XL":6, "XXL":7, "2XL":7, "3XL":8, "4XL":9, "5XL":10};
    function sortStockKeys(stockObj) {
        return Object.keys(stockObj || {}).sort((a, b) => {
            let vA = stockObj[a], vB = stockObj[b];
            let cA = (vA.color || '').toUpperCase(), cB = (vB.color || '').toUpperCase();
            let sA = (vA.size || '').toUpperCase(), sB = (vB.size || '').toUpperCase();
            
            if (cA < cB) return -1;
            if (cA > cB) return 1;
            
            let wA = sizeOrder[sA] !== undefined ? sizeOrder[sA] : (!isNaN(parseInt(sA)) ? parseInt(sA) : 50);
            let wB = sizeOrder[sB] !== undefined ? sizeOrder[sB] : (!isNaN(parseInt(sB)) ? parseInt(sB) : 50);
            
            return wA - wB;
        });
    }

    db.ref('/').on('value', snap => {
        appData = snap.val() || {};
        document.getElementById('loading').classList.add('hidden');
        render();
        updateStats();
    });

    function toggleViewMode() {
        isListView = !isListView;
        document.getElementById('view-icon').className = isListView ? 'fas fa-layer-group' : 'fas fa-list';
        render();
    }

    function render() {
        const area = document.getElementById('content-area');
        area.innerHTML = '';
        if (currentTab === 'stock') renderStock();
        else if (currentTab === 'pending') renderOrders('toOrder');
        else renderOrders('ordered');
    }

    function renderStock() {
        const brands = appData.brands || {};
        const q = (document.getElementById('search-box')?.value || '').toLowerCase().trim();
        let area = document.getElementById('content-area');

        if (Object.keys(brands).length === 0) {
            area.innerHTML = `<div class="card p-16 text-center border-dashed"><p class="font-semibold text-slate-400">El catálogo está vacío.</p></div>`;
            return;
        }

        // --- VISTA DE LISTA TABULAR (AGRUPADA POR MODELO) ---
        if (isListView) {
            let html = `<div class="overflow-x-auto bg-white border border-slate-200 rounded-xl shadow-sm">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b border-slate-200">
                        <tr>
                            <th class="py-3 px-4">Color / Talla</th>
                            <th class="py-3 px-4 text-center">Stock</th>
                            <th class="py-3 px-4">P. Compra</th>
                            <th class="py-3 px-4">P. Venta</th>
                            <th class="py-3 px-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="text-xs divide-y divide-slate-100">`;
            let count = 0;
            
            Object.keys(brands).forEach(bid => {
                const b = brands[bid];
                Object.keys(b.categories || {}).forEach(cid => {
                    const c = b.categories[cid];
                    Object.keys(c.models || {}).forEach(mid => {
                        const m = c.models[mid];
                        const orderedStockKeys = sortStockKeys(m.stock);
                        
                        // Obtenemos los precios del MODELO (o 0 si aún no los tiene configurados)
                        const m_pc = m.pc || 0;
                        const m_pv = m.pv || 0;
                        const m_ben = m.ben !== undefined ? m.ben : (m_pv - m_pc);
                        // Calculamos el % de beneficio sobre el coste
                        const m_pct = m_pc > 0 ? Math.round((m_ben / m_pc) * 100) : 0;

                        let modelRowsHtml = '';
                        let hasMatchingVariants = false;

                        orderedStockKeys.forEach(sid => {
                            const s = m.stock[sid];
                            const searchStr = `${b.name} ${c.name} ${m.name} ${m.code || ''} ${s.color} ${s.size}`.toLowerCase();
                            
                            if (q && !searchStr.includes(q)) return; // Filtro buscador
                            
                            count++;
                            hasMatchingVariants = true;

                            modelRowsHtml += `<tr class="hover:bg-slate-50/80">
                                <td class="py-2.5 px-4"><span class="font-bold text-slate-700">${s.color}</span> <span class="text-slate-400 font-medium">/ ${s.size}</span></td>
                                <td class="py-2.5 px-4 text-center font-black text-sm ${s.qty === 0 ? 'text-red-500' : 'text-slate-800'}">${s.qty}</td>
                                <td class="py-2.5 px-4 text-slate-500">${m_pc}€</td>
                                <td class="py-2.5 px-4">
                                    <span class="font-bold text-slate-800">${m_pv}€</span>
                                    <span class="text-[9px] text-green-600 block leading-none mt-0.5 font-semibold">Ben. ${m_ben.toFixed(2)}€ <span class="text-slate-400">(${m_pct}%)</span></span>
                                </td>
                                <td class="py-2.5 px-4 text-right">
                                    <button onclick="editVariantModal('${bid}','${cid}','${mid}','${sid}')" class="text-slate-400 hover:text-blue-600 mr-3" title="Editar Stock"><i class="fas fa-pencil-alt"></i></button>
                                    <button onclick="addToOrderFromStock('${bid}','${cid}','${mid}','${sid}')" class="text-slate-400 hover:text-amber-500 mr-3" title="Añadir a Por Pedir"><i class="fas fa-shopping-cart"></i></button>
                                    <button onclick="del('brands/${bid}/categories/${cid}/models/${mid}/stock/${sid}')" class="text-slate-400 hover:text-red-500" title="Eliminar Variante"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>`;
                        });

                        // Si hay al menos una variante que mostrar, pintamos primero la fila separadora del modelo
                        if (hasMatchingVariants) {
                            const codeTag = m.code ? `<span class="bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono text-[10px] ml-2">[${m.code}]</span>` : '';
                            html += `
                                <tr class="bg-slate-100/80 border-t-2 border-slate-200">
                                    <td colspan="5" class="py-2 px-4">
                                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-2">
                                            <div class="font-bold text-slate-800 text-xs uppercase tracking-wide">
                                                ${b.name} <i class="fas fa-chevron-right text-[8px] text-slate-400 mx-1"></i> ${c.name} <i class="fas fa-chevron-right text-[8px] text-slate-400 mx-1"></i> <span class="text-sm text-slate-900">${m.name}</span> ${codeTag}
                                            </div>
                                            <div class="flex items-center gap-3 text-[10px] font-bold text-slate-500">
                                                <span class="bg-white px-2 py-1 rounded shadow-sm border border-slate-200"><i class="fas fa-tag text-slate-300 mr-1"></i>Compra: ${m_pc}€</span>
                                                <span class="bg-green-50 text-green-700 px-2 py-1 rounded shadow-sm border border-green-100"><i class="fas fa-euro-sign text-green-400 mr-1"></i>Ben: ${m_ben.toFixed(2)}€ (${m_pct}%)</span>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            `;
                            // Y luego añadimos las variantes
                            html += modelRowsHtml;
                        }
                    });
                });
            });
            if(count === 0) html += `<tr><td colspan="5" class="py-12 text-center text-slate-400 font-medium">No se encontraron resultados para "${q}"</td></tr>`;
            area.innerHTML = html + `</tbody></table></div>`;
            return;
        }

        // --- VISTA ACORDEÓN POR CARPETAS ---
        let finalHtml = '';
        let globalCount = 0;

        Object.keys(brands).forEach(bid => {
            const b = brands[bid];
            let bMatches = q === '' || b.name.toLowerCase().includes(q);
            let bHasMatches = bMatches;
            let catHTML = '';

            Object.keys(b.categories || {}).forEach(cid => {
                const c = b.categories[cid];
                let cMatches = c.name.toLowerCase().includes(q);
                let cHasMatches = cMatches;
                let modHTML = '';

                Object.keys(c.models || {}).forEach(mid => {
                    const m = c.models[mid];
                    const codeStr = m.code ? m.code.toLowerCase() : '';
                    let mMatches = m.name.toLowerCase().includes(q) || codeStr.includes(q);
                    let mHasMatches = mMatches;
                    let varHTML = '';

                    const orderedStockKeys = sortStockKeys(m.stock);
                    
                    // Precios por Modelo
                    const m_pc = m.pc || 0;
                    const m_pv = m.pv || 0;
                    const m_ben = m.ben !== undefined ? m.ben : (m_pv - m_pc);
                    const m_pct = m_pc > 0 ? Math.round((m_ben / m_pc) * 100) : 0;

                    orderedStockKeys.forEach(sid => {
                        const s = m.stock[sid];
                        let sMatches = `${s.color} ${s.size}`.toLowerCase().includes(q);
                        
                        if (q === '' || bMatches || cMatches || mMatches || sMatches) {
                            mHasMatches = true; cHasMatches = true; bHasMatches = true;
                            
                            varHTML += `<tr class="hover:bg-slate-50/50">
                                <td class="py-3 px-4 font-semibold text-slate-700">${s.color} <span class="text-slate-400 font-normal ml-1">${s.size}</span></td>
                                <td class="py-3 px-4">
                                    <div class="flex items-center justify-center gap-3">
                                        <button onclick="adjust('${bid}','${cid}','${mid}','${sid}',-1)" class="w-6 h-6 rounded bg-slate-100 text-slate-500 hover:bg-slate-200">-</button>
                                        <span class="font-bold text-sm w-4 text-center ${s.qty === 0 ? 'text-red-600' : 'text-slate-800'}">${s.qty}</span>
                                        <button onclick="adjust('${bid}','${cid}','${mid}','${sid}',1)" class="w-6 h-6 rounded bg-slate-100 text-slate-500 hover:bg-slate-200">+</button>
                                    </div>
                                </td>
                                <td class="py-3 px-4 text-slate-500">${m_pc}€</td>
                                <td class="py-3 px-4">
                                    <span class="font-semibold text-slate-800">${m_pv}€</span>
                                    <span class="text-[9px] text-green-600 block leading-none mt-0.5 font-semibold">Ben. ${m_ben.toFixed(2)}€ <span class="text-slate-400">(${m_pct}%)</span></span>
                                </td>
                                <td class="py-3 px-4 text-right">
                                    <button onclick="editVariantModal('${bid}','${cid}','${mid}','${sid}')" class="text-slate-400 hover:text-blue-600 mr-3" title="Editar Stock"><i class="fas fa-pencil-alt"></i></button>
                                    <button onclick="addToOrderFromStock('${bid}','${cid}','${mid}','${sid}')" class="text-slate-400 hover:text-amber-500 mr-3" title="Añadir a Por Pedir"><i class="fas fa-shopping-cart"></i></button>
                                    <button onclick="del('brands/${bid}/categories/${cid}/models/${mid}/stock/${sid}')" class="text-slate-400 hover:text-red-500" title="Eliminar Variante"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>`;
                        }
                    });

                    if (mHasMatches) {
                        let isModelOpen = expanded.models[mid] || q !== '';
                        const displayCode = m.code ? `<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md font-mono mr-2">[${m.code}]</span>` : '';
                        
                        modHTML += `<div class="bg-white border border-slate-200 rounded-lg shadow-sm mb-2">
                            <div class="p-3 flex justify-between items-center cursor-pointer hover:bg-slate-50" onclick="toggleExpand('models', '${mid}')">
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-caret-${isModelOpen ? 'down' : 'right'} text-slate-400 text-xs w-3 text-center"></i>
                                    <span class="text-sm font-bold text-slate-800">${displayCode}${m.name}</span>
                                    <span class="hidden md:inline-block ml-3 text-[10px] font-bold text-green-700 bg-green-50 px-2 py-0.5 rounded border border-green-100">Beneficio: ${m_ben.toFixed(2)}€ (${m_pct}%)</span>
                                </div>
                                <div class="flex gap-4">
                                    <button onclick="event.stopPropagation(); showModal('variant', '${bid}', '${cid}', '${mid}')" class="text-slate-400 hover:text-green-600" title="Añadir Variante"><i class="fas fa-plus text-xs"></i></button>
                                    <button onclick="event.stopPropagation(); editModelModal('${bid}', '${cid}', '${mid}')" class="text-slate-400 hover:text-blue-600" title="Editar Modelo y Precios"><i class="fas fa-edit text-xs"></i></button>
                                    <button onclick="event.stopPropagation(); del('brands/${bid}/categories/${cid}/models/${mid}')" class="text-slate-400 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                                </div>
                            </div>`;
                        if (isModelOpen) {
                            modHTML += `<div class="overflow-x-auto border-t border-slate-100"><table class="w-full text-left whitespace-nowrap"><thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-semibold border-b border-slate-100"><tr><th class="py-2 px-4">Color / Talla</th><th class="py-2 px-4 text-center">Stock</th><th class="py-2 px-4">Coste</th><th class="py-2 px-4">P.Venta</th><th class="py-2 px-4 text-right">Acción</th></tr></thead><tbody class="text-xs divide-y divide-slate-100">${varHTML}</tbody></table></div>`;
                        }
                        modHTML += `</div>`;
                    }
                });

                if (cHasMatches) {
                    let isCatOpen = expanded.cats[cid] || q !== '';
                    catHTML += `<div class="border border-slate-200 rounded-xl overflow-hidden mb-3 last:mb-0">
                        <div class="p-3 bg-white flex justify-between items-center cursor-pointer hover:bg-slate-50 border-b border-slate-100" onclick="toggleExpand('cats', '${cid}')">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-chevron-${isCatOpen ? 'up' : 'right'} text-slate-400 text-[10px] w-3 text-center"></i>
                                <span class="text-sm font-semibold text-slate-700">${c.name}</span>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="event.stopPropagation(); showModal('model', '${bid}', '${cid}')" class="text-slate-300 hover:text-green-600" title="Añadir Modelo"><i class="fas fa-plus text-xs"></i></button>
                                <button onclick="event.stopPropagation(); editNameModal('brands/${bid}/categories/${cid}/name', '${c.name}', 'Renombrar Tipo')" class="text-slate-300 hover:text-blue-600"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="event.stopPropagation(); del('brands/${bid}/categories/${cid}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </div>`;
                    if (isCatOpen) catHTML += `<div class="p-3 bg-slate-50/50">${modHTML}</div>`;
                    catHTML += `</div>`;
                }
            });

            if (bHasMatches) {
                globalCount++;
                let isBrandOpen = expanded.brands[bid] || q !== '';
                finalHtml += `<div class="card overflow-hidden mb-4">
                    <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-100" onclick="toggleExpand('brands', '${bid}')">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-${isBrandOpen ? 'up' : 'down'} text-slate-500 text-xs w-4 text-center"></i>
                            <h3 class="text-base font-bold text-slate-800">${b.name}</h3>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="event.stopPropagation(); showModal('garment', '${bid}')" class="text-slate-400 hover:text-green-600" title="Añadir Tipo de Prenda"><i class="fas fa-plus"></i></button>
                            <button onclick="event.stopPropagation(); editNameModal('brands/${bid}/name', '${b.name}', 'Renombrar Marca')" class="text-slate-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="event.stopPropagation(); del('brands/${bid}')" class="text-slate-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                if (isBrandOpen) finalHtml += `<div class="p-4">${catHTML}</div>`;
                finalHtml += `</div>`;
            }
        });

        if (globalCount === 0) finalHtml = `<div class="card p-16 text-center border-dashed"><p class="font-semibold text-slate-400">No se encontraron resultados.</p></div>`;
        area.innerHTML = finalHtml;
    }

    function renderOrders(type) {
        const orders = appData[type] || {};
        const area = document.getElementById('content-area');
        const isPending = type === 'toOrder';
        const q = (document.getElementById('search-box')?.value || '').toLowerCase().trim();
        
        let html = '';
        let count = 0;

        if (isListView) {
            html += `<div class="overflow-x-auto bg-white border border-slate-200 rounded-xl shadow-sm">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b border-slate-200">
                        <tr><th class="py-3 px-4">Marca</th><th class="py-3 px-4">Modelo</th><th class="py-3 px-4 text-center">Cód.</th><th class="py-3 px-4">Variante</th><th class="py-3 px-4 text-center">Uds.</th><th class="py-3 px-4">P.Compra</th><th class="py-3 px-4 text-right">Acción</th></tr>
                    </thead><tbody class="text-xs divide-y divide-slate-100">`;
            
            Object.keys(orders).forEach(oid => {
                const o = orders[oid];
                const searchStr = `${o.brand} ${o.model} ${o.code || ''} ${o.variant}`.toLowerCase();
                if (q && !searchStr.includes(q)) return;
                count++;
                
                html += `<tr class="hover:bg-slate-50/80">
                    <td class="py-3 px-4 font-bold text-slate-800">${o.brand}</td>
                    <td class="py-3 px-4 font-bold text-slate-700">${o.model}</td>
                    <td class="py-3 px-4 text-center text-slate-400 font-mono">${o.code || '-'}</td>
                    <td class="py-3 px-4 font-semibold">${o.variant}</td>
                    <td class="py-3 px-4 text-center font-black">${o.qty}</td>
                    <td class="py-3 px-4 text-slate-500">${o.pc || 0}€</td>
                    <td class="py-3 px-4 text-right">
                        <button onclick="${isPending ? `moveOrder('${oid}')` : `receiveOrder('${oid}')`}" class="mr-3 px-3 py-1 rounded-lg text-[9px] font-bold uppercase tracking-wide ${isPending ? 'bg-slate-900 text-white' : 'bg-green-600 text-white'}">${isPending ? 'Ya lo pedí' : 'Recibido'}</button>
                        <button onclick="del('${type}/${oid}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            if(count === 0) html += `<tr><td colspan="7" class="py-12 text-center text-slate-400 font-medium">${q ? 'No hay resultados.' : 'Bandeja vacía.'}</td></tr>`;
            area.innerHTML = html + `</tbody></table></div>`;
            return;
        }

        Object.keys(orders).forEach(oid => {
            const o = orders[oid];
            const searchStr = `${o.brand} ${o.model} ${o.code || ''} ${o.variant}`.toLowerCase();
            if (q && !searchStr.includes(q)) return;
            count++;

            const displayCode = o.code ? `<span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono mr-1">[${o.code}]</span>` : '';
            html += `<div class="card p-4 flex justify-between items-center mb-3 hover:shadow-md transition-shadow">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full ${isPending ? 'bg-amber-50 text-amber-600' : 'bg-green-50 text-green-600'} flex items-center justify-center text-sm">
                        <i class="fas ${isPending ? 'fa-box-open' : 'fa-check'}"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-800">${o.brand} <span class="text-slate-400 font-normal mx-1">/</span> ${displayCode}${o.model}</p>
                        <p class="text-xs text-slate-500 mt-0.5"><span class="font-semibold text-slate-700">${o.variant}</span> &bull; ${o.qty} uds. &bull; P.Compra: ${o.pc || 0}€</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="${isPending ? `moveOrder('${oid}')` : `receiveOrder('${oid}')`}" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wide ${isPending ? 'bg-slate-900 text-white hover:bg-slate-800' : 'bg-green-600 text-white hover:bg-green-700'} transition-colors">
                        ${isPending ? 'Ya lo pedí' : 'Recibido'}
                    </button>
                    <button onclick="del('${type}/${oid}')" class="text-slate-300 hover:text-red-500 px-2"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        });
        
        if (count === 0) html = `<div class="card p-16 text-center border-dashed"><p class="font-medium text-slate-400">${q ? 'No hay resultados.' : 'Bandeja vacía.'}</p></div>`;
        area.innerHTML = html;
    }

    // --- ACCIONES GENERALES ---
    function toggleExpand(type, id) { expanded[type][id] = !expanded[type][id]; render(); }
    
    function adjust(bid, cid, mid, sid, delta) {
        db.ref(`brands/${bid}/categories/${cid}/models/${mid}/stock/${sid}/qty`).transaction(q => Math.max(0, (q || 0) + delta));
    }

    function addToOrderFromStock(bid, cid, mid, sid) {
        const b = appData.brands[bid], m = b.categories[cid].models[mid], s = m.stock[sid];
        const pc = m.pc || 0; // Usamos precio del modelo
        document.getElementById('modal-title').innerText = 'Añadir a Por Pedir';
        document.getElementById('modal-body').innerHTML = `
            <p class="text-sm text-slate-600 mb-3">¿Cuántas unidades faltan de <b>${m.name} (${s.color}/${s.size})</b>?</p>
            <input id="add-order-qty" type="number" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-slate-800" placeholder="Ej: 10" autofocus>
        `;
        document.getElementById('modal-btn').onclick = () => {
            const qty = parseInt(document.getElementById('add-order-qty').value);
            if(qty && qty > 0) {
                db.ref('toOrder').push({
                    brand: b.name, model: m.name, code: m.code || '', variant: `${s.color}/${s.size}`,
                    qty: qty, pc: pc, ref: { bid, cid, mid, sid }
                });
                switchTab('pending');
            }
            closeModal();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function moveOrder(id) {
        db.ref(`ordered/${id}`).set(appData.toOrder[id]);
        db.ref(`toOrder/${id}`).remove();
    }

    function receiveOrder(id) {
        const o = appData.ordered[id];
        if(o.ref && o.ref.bid) { db.ref(`brands/${o.ref.bid}/categories/${o.ref.cid}/models/${o.ref.mid}/stock/${o.ref.sid}/qty`).transaction(q => (q || 0) + o.qty); }
        db.ref(`ordered/${id}`).remove();
    }

    function del(path) {
        document.getElementById('modal-title').innerText = 'Confirmar Borrado';
        document.getElementById('modal-body').innerHTML = `<p class="text-sm text-slate-600">Esta acción no se puede deshacer. ¿Estás seguro?</p>`;
        document.getElementById('modal-btn').onclick = () => { db.ref(path).remove(); closeModal(); };
        document.getElementById('modal-btn').className = "bg-red-600 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-red-700 transition-colors";
        document.getElementById('modal').classList.remove('hidden');
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('button[id^="tab-"]').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
        document.getElementById('tab-' + t).classList.add('tab-active'); document.getElementById('tab-' + t).classList.remove('tab-inactive');
        render();
    }

    // --- SISTEMA DE MODALES ---
    function editNameModal(path, oldName, title) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = `
            <label class="text-xs font-bold text-slate-500 mb-1 block">Nombre</label>
            <input id="edit-val" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800" value="${oldName}">
        `;
        document.getElementById('modal-btn').className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal-btn').onclick = () => {
            const v = document.getElementById('edit-val').value.trim();
            if(v && v !== oldName) db.ref(path).set(v.toUpperCase());
            closeModal();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function editModelModal(bid, cid, mid) {
        const m = appData.brands[bid].categories[cid].models[mid];
        // Calculamos el beneficio actual si no existe el campo 'ben' de forma explícita
        const m_pc = m.pc || 0;
        const m_pv = m.pv || 0;
        const currentBen = m.ben !== undefined ? m.ben : (m_pv - m_pc);

        document.getElementById('modal-title').innerText = 'Editar Modelo y Precios';
        document.getElementById('modal-body').innerHTML = `
            <label class="text-xs font-bold text-slate-500 mb-1 block">Nombre del Modelo</label>
            <input id="em-name" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mb-3" value="${m.name}">
            
            <label class="text-xs font-bold text-slate-500 mb-1 block">Código Numérico (Opcional)</label>
            <input id="em-code" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mb-4" value="${m.code || ''}">
            
            <div class="grid grid-cols-2 gap-3 border-t border-slate-200 pt-4">
                <div><label class="text-xs font-bold text-slate-500 mb-1 block">Coste Compra (€)</label>
                <input id="em-pc" type="number" step="0.01" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-slate-800" value="${m_pc}"></div>
                
                <div><label class="text-xs font-bold text-slate-500 mb-1 block">Beneficio Fijo (€)</label>
                <input id="em-ben" type="number" step="0.01" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-slate-800" value="${currentBen}"></div>
            </div>
            <p class="text-[10px] text-slate-400 mt-2"><i class="fas fa-info-circle mr-1"></i>Estos precios aplicarán a todas las tallas y colores de este modelo.</p>
        `;
        document.getElementById('modal-btn').className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal-btn').onclick = () => {
            const name = document.getElementById('em-name').value.trim().toUpperCase();
            const code = document.getElementById('em-code').value.trim().toUpperCase();
            const pc = parseFloat(document.getElementById('em-pc').value) || 0;
            const ben = parseFloat(document.getElementById('em-ben').value) || 0;
            const pv = pc + ben; // Guardamos el Precio de Venta final

            if(name) db.ref(`brands/${bid}/categories/${cid}/models/${mid}`).update({name, code, pc, ben, pv});
            closeModal();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function editVariantModal(bid, cid, mid, sid) {
        const s = appData.brands[bid].categories[cid].models[mid].stock[sid];
        document.getElementById('modal-title').innerText = `Editar Stock de Variante`;
        document.getElementById('modal-body').innerHTML = `
            <p class="text-sm font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">${s.color} <span class="text-slate-400">/ ${s.size}</span></p>
            <div>
                <label class="text-xs font-bold text-slate-500 mb-1 block">Unidades Disponibles</label>
                <input id="ev-qty" type="number" class="w-full border border-slate-300 p-3 rounded-xl font-black text-2xl text-center text-slate-800" value="${s.qty}">
            </div>`;
        document.getElementById('modal-btn').className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal-btn').onclick = () => {
            const qty = parseInt(document.getElementById('ev-qty').value) || 0;
            db.ref(`brands/${bid}/categories/${cid}/models/${mid}/stock/${sid}`).update({qty});
            closeModal();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function showModal(type, preBid = null, preCid = null, preMid = null) {
        const body = document.getElementById('modal-body');
        const title = document.getElementById('modal-title');
        const btn = document.getElementById('modal-btn');
        btn.className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal').classList.remove('hidden');

        if (type === 'brand') {
            title.innerText = 'Nueva Marca';
            body.innerHTML = `<input id="f1" placeholder="Nombre (Ej: ROLY)" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800" autofocus>`;
            btn.onclick = () => { const v = document.getElementById('f1').value.trim(); if(v) db.ref('brands').push({name:v.toUpperCase()}); expanded.brands = {}; closeModal(); } 
        } else if (type === 'garment') {
            title.innerText = 'Nuevo Tipo de Prenda';
            body.innerHTML = `${brandSelect()}<input id="f1" placeholder="Tipo (Ej: CAMISETA)" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mt-3" autofocus>`;
            
            if(preBid) document.getElementById('sb').value = preBid;
            
            btn.onclick = () => { const b = document.getElementById('sb').value; const v = document.getElementById('f1').value.trim(); if(b && v) { db.ref(`brands/${b}/categories`).push({name:v.toUpperCase()}); expanded.brands[b] = true; closeModal(); } }
        } else if (type === 'model') {
            title.innerText = 'Nuevo Modelo';
            body.innerHTML = `${brandSelect()}<div id="scat"></div>
                <input id="f1" placeholder="Nombre Modelo (Ej: DOGMA)" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mt-3" autofocus>
                <input id="fcode" placeholder="Código (Ej: 6502) - Opcional" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mt-3">
                <div class="grid grid-cols-2 gap-3 border-t border-slate-200 pt-3 mt-3">
                    <input id="fpc" type="number" step="0.01" placeholder="Coste Compra €" class="border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-800">
                    <input id="fben" type="number" step="0.01" placeholder="Beneficio Fijo €" class="border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-800">
                </div>
                <p class="text-[10px] text-slate-400 mt-2"><i class="fas fa-info-circle mr-1"></i>Indica el precio del modelo base. Luego añadirás colores y tallas.</p>
                `;
            document.getElementById('sb').onchange = (e) => loadCategories(e.target.value);
            
            if(preBid) {
                document.getElementById('sb').value = preBid;
                loadCategories(preBid, preCid);
            }

            btn.onclick = () => {
                const b = document.getElementById('sb').value; const c = document.getElementById('sc')?.value; 
                const v = document.getElementById('f1').value.trim(); const code = document.getElementById('fcode').value.trim();
                const pc = parseFloat(document.getElementById('fpc').value) || 0;
                const ben = parseFloat(document.getElementById('fben').value) || 0;
                const pv = pc + ben;

                if(b && c && v) { 
                    db.ref(`brands/${b}/categories/${c}/models`).push({name:v.toUpperCase(), code:code.toUpperCase(), pc, ben, pv}); 
                    expanded.brands[b] = true; expanded.cats[c] = true; closeModal(); 
                }
            }
        } else if (type === 'variant') {
            title.innerText = 'Nueva Variante (Talla/Color)';
            body.innerHTML = `${brandSelect()}<div id="scat"></div><div id="smod"></div>
                <div class="grid grid-cols-2 gap-3 mt-3">
                    <input id="fc" placeholder="COLOR (Ej: NEGRO)" class="border border-slate-300 p-3 rounded-xl font-bold uppercase text-sm text-slate-800" autofocus>
                    <input id="ft" placeholder="TALLA (Ej: XL)" class="border border-slate-300 p-3 rounded-xl font-bold uppercase text-sm text-slate-800">
                </div>
                <input id="fq" type="number" placeholder="STOCK INICIAL (Uds)" class="w-full border border-slate-300 p-3 rounded-xl font-bold mt-3 text-slate-800 text-center text-lg">
                <p class="text-[10px] text-slate-400 mt-2 text-center">Los precios de venta se heredarán del modelo.</p>
                `;
            document.getElementById('sb').onchange = (e) => loadCategories(e.target.value);
            
            if(preBid) {
                document.getElementById('sb').value = preBid;
                loadCategories(preBid, preCid, preMid);
            }

            btn.onclick = () => {
                const b = document.getElementById('sb').value, c = document.getElementById('sc')?.value, m = document.getElementById('sm')?.value;
                const color = document.getElementById('fc').value.trim(), talla = document.getElementById('ft').value.trim(), stock = parseInt(document.getElementById('fq').value) || 0;
                
                if(b && c && m && color && talla) { 
                    db.ref(`brands/${b}/categories/${c}/models/${m}/stock`).push({color:color.toUpperCase(), size:talla.toUpperCase(), qty:stock});
                    expanded.brands[b] = true; expanded.cats[c] = true; expanded.models[m] = true; closeModal();
                }
            }
        }
    }

    function brandSelect() {
        let html = `<select id="sb" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-600 bg-white"><option value="">-- Selecciona Marca --</option>`;
        Object.keys(appData.brands || {}).forEach(id => html += `<option value="${id}">${appData.brands[id].name}</option>`);
        return html + `</select>`;
    }

    function loadCategories(bid, preCid = null, preMid = null) {
        const div = document.getElementById('scat'); 
        if(!bid) { 
            if(div) div.innerHTML = ''; 
            const smod = document.getElementById('smod');
            if(smod) smod.innerHTML = ''; 
            return; 
        }
        if(!div) return;

        let html = `<select id="sc" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-600 bg-white mt-3"><option value="">-- Selecciona Tipo --</option>`;
        Object.keys(appData.brands[bid].categories || {}).forEach(id => html += `<option value="${id}">${appData.brands[bid].categories[id].name}</option>`);
        div.innerHTML = html + `</select>`;
        document.getElementById('sc').onchange = (e) => loadModels(bid, e.target.value);

        if(preCid) {
            document.getElementById('sc').value = preCid;
            loadModels(bid, preCid, preMid);
        }
    }

    function loadModels(bid, cid, preMid = null) {
        const div = document.getElementById('smod'); 
        if(!div) return; 
        if(!cid) { div.innerHTML = ''; return; }
        
        let html = `<select id="sm" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-600 bg-white mt-3"><option value="">-- Selecciona Modelo --</option>`;
        Object.keys(appData.brands[bid].categories[cid].models || {}).forEach(id => html += `<option value="${id}">${appData.brands[bid].categories[cid].models[id].name}</option>`);
        div.innerHTML = html + `</select>`;

        if(preMid) {
            document.getElementById('sm').value = preMid;
        }
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    // --- CÁLCULO DE ESTADÍSTICAS ---
    function updateStats() {
        let total = 0, low = 0, invest = 0, profit = 0;
        Object.values(appData.brands || {}).forEach(b => {
            Object.values(b.categories || {}).forEach(c => {
                Object.values(c.models || {}).forEach(m => {
                    // Precio tomado a nivel de Modelo
                    const m_pc = m.pc || 0;
                    const m_pv = m.pv || 0;

                    Object.values(m.stock || {}).forEach(s => {
                        const qty = s.qty || 0;
                        
                        total += qty;
                        invest += (qty * m_pc);
                        profit += (qty * (m_pv - m_pc));
                        
                        if(qty === 0) low++;
                    });
                });
            });
        });
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-low').innerText = low;
        document.getElementById('stat-investment').innerText = invest.toFixed(2) + '€';
        document.getElementById('stat-profit').innerText = profit.toFixed(2) + '€';
    }
</script>
</body>
</html>
