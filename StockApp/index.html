<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpreCan Stock & Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .tab-active { background: #0f172a; color: white; font-weight: 600; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .tab-inactive:hover { background: #e2e8f0; }
        .btn-primary { background: #0f172a; color: white; padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background: #1e293b; transform: translateY(-1px); }
        .transition-transform { transition: transform 0.2s ease; }
    </style>
</head>
<body class="pb-24">

<div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
    <div class="w-10 h-10 border-4 border-slate-100 border-t-slate-800 rounded-full animate-spin"></div>
    <p class="mt-4 font-semibold text-slate-500 text-sm">Sincronizando datos...</p>
</div>

<div class="max-w-5xl mx-auto p-4 md:p-6">
    <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">ImpreCan Business</h1>
            <p class="text-slate-500 text-sm mt-1">Control de inventario y rentabilidad</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <button onclick="showModal('brand')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm"><i class="fas fa-plus mr-2 text-slate-400"></i>Marca</button>
            <button onclick="showModal('garment')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm"><i class="fas fa-plus mr-2 text-slate-400"></i>Tipo</button>
            <button onclick="showModal('model')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm"><i class="fas fa-plus mr-2 text-slate-400"></i>Modelo</button>
            <button onclick="showModal('variant')" class="btn-primary text-xs shadow-md shadow-slate-200"><i class="fas fa-tag mr-2"></i>Nueva Variante</button>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
        <div class="card p-4">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Unidades Stock</p>
            <p id="stat-total" class="text-2xl font-black mt-1">0</p>
        </div>
        <div class="card p-4">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Inversión (Coste)</p>
            <p id="stat-investment" class="text-2xl font-black mt-1 text-slate-700">0€</p>
        </div>
        <div class="card p-4 bg-green-50 border-green-100">
            <p class="text-[10px] text-green-600 font-bold uppercase tracking-wider">Beneficio Estimado</p>
            <p id="stat-profit" class="text-2xl font-black mt-1 text-green-700">0€</p>
        </div>
        <div class="card p-4 bg-amber-50 border-amber-100">
            <p class="text-[10px] text-amber-600 font-bold uppercase tracking-wider">Bajo Stock</p>
            <p id="stat-low" class="text-2xl font-black mt-1 text-amber-700">0</p>
        </div>
    </div>

    <div class="bg-slate-100 p-1.5 rounded-2xl flex max-w-md mb-6">
        <button onclick="switchTab('stock')" id="tab-stock" class="flex-1 py-2.5 text-sm rounded-xl tab-active transition-all">Stock</button>
        <button onclick="switchTab('pending')" id="tab-pending" class="flex-1 py-2.5 text-sm rounded-xl tab-inactive transition-all">Por Pedir</button>
        <button onclick="switchTab('ordered')" id="tab-ordered" class="flex-1 py-2.5 text-sm rounded-xl tab-inactive transition-all">Ya Pedidos</button>
    </div>

    <div id="content-area" class="space-y-4"></div>
</div>

<div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-[200] p-4">
    <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-5">
            <h3 id="modal-title" class="text-lg font-bold text-slate-800"></h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
        </div>
        <div id="modal-body" class="space-y-4"></div>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="closeModal()" class="text-sm font-semibold text-slate-500 hover:text-slate-800 px-2">Cancelar</button>
            <button id="modal-btn" class="bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors">Guardar</button>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCiesjFpko52HogjrAHiFS7SMaSwSLfNuo",
        authDomain: "stock-imprecan.firebaseapp.com",
        databaseURL: "https://stock-imprecan-default-rtdb.firebaseio.com",
        projectId: "stock-imprecan",
        storageBucket: "stock-imprecan.appspot.com",
        messagingSenderId: "313112425492",
        appId: "1:313112425492:web:068c6a7f3bc10ec9d4a301"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // --- 2. ESTADO DE LA APP ---
    let appData = {};
    let currentTab = 'stock';
    let expanded = { brands: {}, cats: {}, models: {} }; // Controla qué está desplegado

    // --- 3. ESCUCHA DE DATOS ---
    db.ref('/').on('value', snap => {
        appData = snap.val() || {};
        document.getElementById('loading').classList.add('hidden');
        render();
        updateStats();
    });

    // --- 4. RENDERIZADO PRINCIPAL ---
    function render() {
        const area = document.getElementById('content-area');
        area.innerHTML = '';
        if (currentTab === 'stock') renderStock();
        else if (currentTab === 'pending') renderOrders('toOrder');
        else renderOrders('ordered');
    }

    // --- 5. RENDERIZAR STOCK (CON ACORDEONES) ---
    function renderStock() {
        const brands = appData.brands || {};
        if (Object.keys(brands).length === 0) {
            document.getElementById('content-area').innerHTML = `<div class="card p-16 text-center border-dashed"><p class="font-semibold text-slate-400">El catálogo está vacío. Añade una marca.</p></div>`;
            return;
        }

        Object.keys(brands).forEach(bid => {
            const b = brands[bid];
            const isBrandOpen = !!expanded.brands[bid];
            
            let html = `<div class="card overflow-hidden mb-4">
                <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleExpand('brands', '${bid}')">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-chevron-${isBrandOpen ? 'up' : 'down'} text-slate-400 text-xs transition-transform w-4"></i>
                        <h3 class="text-base font-bold text-slate-800">${b.name}</h3>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="event.stopPropagation(); editNameModal('brands/${bid}/name', '${b.name}', 'Renombrar Marca')" class="text-slate-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                        <button onclick="event.stopPropagation(); del('brands/${bid}')" class="text-slate-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;

            if (isBrandOpen) {
                html += `<div class="p-4 space-y-4">`;
                Object.keys(b.categories || {}).forEach(cid => {
                    const c = b.categories[cid];
                    const isCatOpen = !!expanded.cats[cid];

                    html += `<div class="border border-slate-200 rounded-xl overflow-hidden">
                        <div class="p-3 bg-white flex justify-between items-center cursor-pointer hover:bg-slate-50 border-b border-slate-100" onclick="toggleExpand('cats', '${cid}')">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-chevron-${isCatOpen ? 'up' : 'right'} text-slate-300 text-[10px] w-3"></i>
                                <span class="text-sm font-semibold text-slate-700">${c.name}</span>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="event.stopPropagation(); editNameModal('brands/${bid}/categories/${cid}/name', '${c.name}', 'Renombrar Tipo')" class="text-slate-300 hover:text-blue-600"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="event.stopPropagation(); del('brands/${bid}/categories/${cid}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </div>`;

                    if (isCatOpen) {
                        html += `<div class="p-3 bg-slate-50/50 space-y-3">`;
                        Object.keys(c.models || {}).forEach(mid => {
                            const m = c.models[mid];
                            const isModelOpen = !!expanded.models[mid];

                            html += `<div class="bg-white border border-slate-200 rounded-lg">
                                <div class="p-3 flex justify-between items-center cursor-pointer hover:bg-slate-50" onclick="toggleExpand('models', '${mid}')">
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-caret-${isModelOpen ? 'down' : 'right'} text-slate-400 text-xs w-3"></i>
                                        <span class="text-sm font-bold text-slate-800">${m.name}</span>
                                    </div>
                                    <div class="flex gap-3">
                                        <button onclick="event.stopPropagation(); editNameModal('brands/${bid}/categories/${cid}/models/${mid}/name', '${m.name}', 'Renombrar Modelo')" class="text-slate-300 hover:text-blue-600"><i class="fas fa-edit text-xs"></i></button>
                                        <button onclick="event.stopPropagation(); del('brands/${bid}/categories/${cid}/models/${mid}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                                    </div>
                                </div>`;

                            if (isModelOpen) {
                                html += `<div class="overflow-x-auto border-t border-slate-100">
                                    <table class="w-full text-left whitespace-nowrap">
                                        <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-semibold border-b border-slate-100">
                                            <tr>
                                                <th class="py-2.5 px-4">Color / Talla</th>
                                                <th class="py-2.5 px-4 text-center">Stock</th>
                                                <th class="py-2.5 px-4">P. Compra</th>
                                                <th class="py-2.5 px-4">P. Venta</th>
                                                <th class="py-2.5 px-4 text-right">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody class="text-xs divide-y divide-slate-100">`;
                                
                                Object.keys(m.stock || {}).forEach(sid => {
                                    const s = m.stock[sid];
                                    const profit = ((s.pv || 0) - (s.pc || 0)).toFixed(2);
                                    html += `<tr class="hover:bg-slate-50/50">
                                        <td class="py-3 px-4 font-semibold text-slate-700">${s.color} <span class="text-slate-400 font-normal ml-1">${s.size}</span></td>
                                        <td class="py-3 px-4">
                                            <div class="flex items-center justify-center gap-3">
                                                <button onclick="adjust('${bid}','${cid}','${mid}','${sid}',-1)" class="w-6 h-6 rounded bg-slate-100 text-slate-500 hover:bg-slate-200">-</button>
                                                <span class="font-bold text-sm w-4 text-center ${s.qty <= 2 ? 'text-red-600' : 'text-slate-800'}">${s.qty}</span>
                                                <button onclick="adjust('${bid}','${cid}','${mid}','${sid}',1)" class="w-6 h-6 rounded bg-slate-100 text-slate-500 hover:bg-slate-200">+</button>
                                            </div>
                                        </td>
                                        <td class="py-3 px-4 text-slate-500">${s.pc || 0}€</td>
                                        <td class="py-3 px-4">
                                            <span class="font-semibold text-slate-800">${s.pv || 0}€</span>
                                            <span class="text-[9px] text-green-600 block leading-none mt-0.5">Ben. ${profit}€</span>
                                        </td>
                                        <td class="py-3 px-4 text-right">
                                            <button onclick="editVariantModal('${bid}','${cid}','${mid}','${sid}')" class="text-slate-400 hover:text-blue-600 mr-3" title="Editar Precios y Stock"><i class="fas fa-pencil-alt"></i></button>
                                            <button onclick="addToOrderFromStock('${bid}','${cid}','${mid}','${sid}')" class="text-slate-400 hover:text-amber-500" title="Añadir a Por Pedir"><i class="fas fa-shopping-cart"></i></button>
                                        </td>
                                    </tr>`;
                                });
                                html += `</tbody></table></div>`;
                            }
                            html += `</div>`;
                        });
                        html += `</div>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            document.getElementById('content-area').innerHTML += html;
        });
    }

    // --- 6. RENDERIZAR PEDIDOS Y FALTAS ---
    function renderOrders(type) {
        const orders = appData[type] || {};
        const area = document.getElementById('content-area');
        const isPending = type === 'toOrder';
        
        let html = '';
        
        // Botón "Nuevo Pedido Manual" en Por Pedir
        if(isPending) {
            html += `<div class="mb-4 text-right">
                <button onclick="showModal('manualOrder')" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-700 shadow-sm">
                    <i class="fas fa-plus mr-2 text-amber-500"></i>Nuevo Pedido Manual
                </button>
            </div>`;
        }

        if (Object.keys(orders).length === 0) {
            html += `<div class="card p-16 text-center border-dashed"><p class="font-medium text-slate-400">Bandeja vacía.</p></div>`;
            area.innerHTML = html;
            return;
        }
        
        Object.keys(orders).forEach(oid => {
            const o = orders[oid];
            html += `<div class="card p-4 flex justify-between items-center mb-3 hover:shadow-md transition-shadow">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full ${isPending ? 'bg-amber-50 text-amber-600' : 'bg-green-50 text-green-600'} flex items-center justify-center text-sm">
                        <i class="fas ${isPending ? 'fa-box-open' : 'fa-check'}"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-800">${o.brand} <span class="text-slate-500 font-normal">/</span> ${o.model}</p>
                        <p class="text-xs text-slate-500 mt-0.5"><span class="font-semibold text-slate-700">${o.variant}</span> &bull; ${o.qty} uds. &bull; P.Compra: ${o.pc || 0}€</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="${isPending ? `moveOrder('${oid}')` : `receiveOrder('${oid}')`}" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wide ${isPending ? 'bg-slate-900 text-white hover:bg-slate-800' : 'bg-green-600 text-white hover:bg-green-700'} transition-colors">
                        ${isPending ? 'Ya lo pedí' : 'Recibido'}
                    </button>
                    <button onclick="del('${type}/${oid}')" class="text-slate-300 hover:text-red-500 px-2"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        });
        area.innerHTML = html;
    }

    // --- 7. LÓGICA Y ACCIONES ---
    function toggleExpand(type, id) { expanded[type][id] = !expanded[type][id]; render(); }
    
    function adjust(bid, cid, mid, sid, delta) {
        db.ref(`brands/${bid}/categories/${cid}/models/${mid}/stock/${sid}/qty`).transaction(q => Math.max(0, (q || 0) + delta));
    }

    function addToOrderFromStock(bid, cid, mid, sid) {
        // Aprovechamos el modal limpio para preguntar la cantidad
        const b = appData.brands[bid], m = b.categories[cid].models[mid], s = m.stock[sid];
        
        document.getElementById('modal-title').innerText = 'Añadir a Por Pedir';
        document.getElementById('modal-body').innerHTML = `
            <p class="text-sm text-slate-600 mb-3">¿Cuántas unidades faltan de <b>${m.name} (${s.color}/${s.size})</b>?</p>
            <input id="add-order-qty" type="number" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-slate-800" placeholder="Ej: 10" autofocus>
        `;
        document.getElementById('modal-btn').onclick = () => {
            const qty = parseInt(document.getElementById('add-order-qty').value);
            if(qty && qty > 0) {
                db.ref('toOrder').push({
                    brand: b.name, model: m.name, variant: `${s.color}/${s.size}`,
                    qty: qty, pc: s.pc || 0, ref: { bid, cid, mid, sid }
                });
            }
            closeModal();
            // Ir a la pestaña directamente
            switchTab('pending');
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function moveOrder(id) {
        db.ref(`ordered/${id}`).set(appData.toOrder[id]);
        db.ref(`toOrder/${id}`).remove();
    }

    function receiveOrder(id) {
        const o = appData.ordered[id];
        if(o.ref && o.ref.bid) { // Si viene del catálogo, actualiza stock
            db.ref(`brands/${o.ref.bid}/categories/${o.ref.cid}/models/${o.ref.mid}/stock/${o.ref.sid}/qty`).transaction(q => (q || 0) + o.qty);
        }
        db.ref(`ordered/${id}`).remove();
    }

    function del(path) {
        document.getElementById('modal-title').innerText = 'Confirmar Borrado';
        document.getElementById('modal-body').innerHTML = `<p class="text-sm text-slate-600">Esta acción no se puede deshacer. ¿Estás seguro?</p>`;
        document.getElementById('modal-btn').onclick = () => { db.ref(path).remove(); closeModal(); };
        document.getElementById('modal-btn').className = "bg-red-600 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-red-700 transition-colors";
        document.getElementById('modal').classList.remove('hidden');
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('button[id^="tab-"]').forEach(b => {
            b.classList.remove('tab-active'); b.classList.add('tab-inactive');
        });
        document.getElementById('tab-' + t).classList.add('tab-active');
        document.getElementById('tab-' + t).classList.remove('tab-inactive');
        render();
    }

    // --- 8. SISTEMA DE MODALES LIMPIOS ---
    function editNameModal(path, oldName, title) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = `
            <label class="text-xs font-bold text-slate-500 mb-1 block">Nombre</label>
            <input id="edit-val" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800" value="${oldName}">
        `;
        document.getElementById('modal-btn').className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal-btn').onclick = () => {
            const v = document.getElementById('edit-val').value.trim();
            if(v && v !== oldName) db.ref(path).set(v.toUpperCase());
            closeModal();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function editVariantModal(bid, cid, mid, sid) {
        const s = appData.brands[bid].categories[cid].models[mid].stock[sid];
        document.getElementById('modal-title').innerText = `Editar Variante`;
        document.getElementById('modal-body').innerHTML = `
            <p class="text-sm text-slate-500 mb-4 border-b pb-2">${s.color} / ${s.size}</p>
            <div class="space-y-4">
                <div><label class="text-xs font-bold text-slate-500 mb-1 block">Unidades Reales en Stock</label>
                <input id="ev-qty" type="number" class="w-full border border-slate-300 p-3 rounded-xl font-bold" value="${s.qty}"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs font-bold text-slate-500 mb-1 block">P. Compra (€)</label>
                    <input id="ev-pc" type="number" step="0.01" class="w-full border border-slate-300 p-3 rounded-xl font-bold" value="${s.pc || 0}"></div>
                    <div><label class="text-xs font-bold text-slate-500 mb-1 block">P. Venta (€)</label>
                    <input id="ev-pv" type="number" step="0.01" class="w-full border border-slate-300 p-3 rounded-xl font-bold" value="${s.pv || 0}"></div>
                </div>
            </div>`;
        document.getElementById('modal-btn').className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal-btn').onclick = () => {
            const qty = parseInt(document.getElementById('ev-qty').value) || 0;
            const pc = parseFloat(document.getElementById('ev-pc').value) || 0;
            const pv = parseFloat(document.getElementById('ev-pv').value) || 0;
            db.ref(`brands/${bid}/categories/${cid}/models/${mid}/stock/${sid}`).update({qty, pc, pv});
            closeModal();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function showModal(type) {
        const body = document.getElementById('modal-body');
        const title = document.getElementById('modal-title');
        const btn = document.getElementById('modal-btn');
        btn.className = "bg-slate-900 text-white text-sm px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-colors";
        document.getElementById('modal').classList.remove('hidden');

        if (type === 'brand') {
            title.innerText = 'Nueva Marca';
            body.innerHTML = `<input id="f1" placeholder="Ej: ROLY" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800">`;
            btn.onclick = () => { const v = document.getElementById('f1').value.trim(); if(v) db.ref('brands').push({name:v.toUpperCase()}); closeModal(); expanded.brands = {}; } // Resetea acordeones para mostrar la nueva
        } else if (type === 'garment') {
            title.innerText = 'Nuevo Tipo de Prenda';
            body.innerHTML = `${brandSelect()}<input id="f1" placeholder="Ej: CAMISETA" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mt-3">`;
            btn.onclick = () => { const b = document.getElementById('sb').value; const v = document.getElementById('f1').value.trim(); if(b && v) { db.ref(`brands/${b}/categories`).push({name:v.toUpperCase()}); expanded.brands[b] = true; closeModal(); } }
        } else if (type === 'model') {
            title.innerText = 'Nuevo Modelo';
            body.innerHTML = `${brandSelect()}<div id="scat"></div><input id="f1" placeholder="Ej: DOGMA" class="w-full border border-slate-300 p-3 rounded-xl font-bold uppercase text-slate-800 mt-3">`;
            document.getElementById('sb').onchange = (e) => loadCategories(e.target.value);
            btn.onclick = () => {
                const b = document.getElementById('sb').value; const c = document.getElementById('sc')?.value; const v = document.getElementById('f1').value.trim();
                if(b && c && v) { db.ref(`brands/${b}/categories/${c}/models`).push({name:v.toUpperCase()}); expanded.brands[b] = true; expanded.cats[c] = true; closeModal(); }
            }
        } else if (type === 'variant') {
            title.innerText = 'Nueva Variante';
            body.innerHTML = `${brandSelect()}<div id="scat"></div><div id="smod"></div>
                <div class="grid grid-cols-2 gap-3 mt-3"><input id="fc" placeholder="COLOR" class="border border-slate-300 p-3 rounded-xl font-bold uppercase text-sm"><input id="ft" placeholder="TALLA" class="border border-slate-300 p-3 rounded-xl font-bold uppercase text-sm"></div>
                <div class="grid grid-cols-2 gap-3 mt-3"><input id="fpc" type="number" step="0.01" placeholder="P. Compra €" class="border border-slate-300 p-3 rounded-xl font-bold text-sm"><input id="fpv" type="number" step="0.01" placeholder="P. Venta €" class="border border-slate-300 p-3 rounded-xl font-bold text-sm"></div>
                <input id="fq" type="number" placeholder="STOCK INICIAL" class="w-full border border-slate-300 p-3 rounded-xl font-bold mt-3">`;
            document.getElementById('sb').onchange = (e) => loadCategories(e.target.value);
            btn.onclick = () => {
                const b = document.getElementById('sb').value, c = document.getElementById('sc')?.value, m = document.getElementById('sm')?.value;
                const color = document.getElementById('fc').value.trim(), talla = document.getElementById('ft').value.trim(), stock = parseInt(document.getElementById('fq').value) || 0;
                const pc = parseFloat(document.getElementById('fpc').value) || 0, pv = parseFloat(document.getElementById('fpv').value) || 0;
                if(b && c && m && color && talla) { 
                    db.ref(`brands/${b}/categories/${c}/models/${m}/stock`).push({color:color.toUpperCase(), size:talla.toUpperCase(), qty:stock, pc, pv});
                    expanded.brands[b] = true; expanded.cats[c] = true; expanded.models[m] = true; closeModal();
                }
            }
        } else if (type === 'manualOrder') {
            // Modal para pedido libre sin tener que estar en catálogo
            title.innerText = 'Crear Faltante (Pedido Libre)';
            body.innerHTML = `
                <input id="mo-brand" placeholder="Marca (Ej: Roly)" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm mb-3">
                <input id="mo-model" placeholder="Modelo (Ej: Camiseta Dogma)" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm mb-3">
                <input id="mo-var" placeholder="Color y Talla (Ej: Azul / L)" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm mb-3">
                <div class="grid grid-cols-2 gap-3">
                    <input id="mo-qty" type="number" placeholder="Cantidad" class="border border-slate-300 p-3 rounded-xl font-bold text-sm">
                    <input id="mo-pc" type="number" step="0.01" placeholder="Coste ud. €" class="border border-slate-300 p-3 rounded-xl font-bold text-sm">
                </div>
            `;
            btn.onclick = () => {
                const brand = document.getElementById('mo-brand').value.trim() || 'VARIOS';
                const model = document.getElementById('mo-model').value.trim() || 'Sin especificar';
                const variant = document.getElementById('mo-var').value.trim() || '-';
                const qty = parseInt(document.getElementById('mo-qty').value) || 1;
                const pc = parseFloat(document.getElementById('mo-pc').value) || 0;
                
                db.ref('toOrder').push({ brand, model, variant, qty, pc, ref: null }); // ref null porque no se enlaza autómaticamente
                closeModal();
            }
        }
    }

    function brandSelect() {
        let html = `<select id="sb" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-600 bg-white"><option value="">-- Selecciona Marca --</option>`;
        Object.keys(appData.brands || {}).forEach(id => html += `<option value="${id}">${appData.brands[id].name}</option>`);
        return html + `</select>`;
    }

    function loadCategories(bid) {
        const div = document.getElementById('scat'); if(!bid) { div.innerHTML = ''; document.getElementById('smod').innerHTML = ''; return; }
        let html = `<select id="sc" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-600 bg-white mt-3"><option value="">-- Selecciona Tipo --</option>`;
        Object.keys(appData.brands[bid].categories || {}).forEach(id => html += `<option value="${id}">${appData.brands[bid].categories[id].name}</option>`);
        div.innerHTML = html + `</select>`;
        document.getElementById('sc').onchange = (e) => loadModels(bid, e.target.value);
    }

    function loadModels(bid, cid) {
        const div = document.getElementById('smod'); if(!cid) { div.innerHTML = ''; return; }
        let html = `<select id="sm" class="w-full border border-slate-300 p-3 rounded-xl font-bold text-sm text-slate-600 bg-white mt-3"><option value="">-- Selecciona Modelo --</option>`;
        Object.keys(appData.brands[bid].categories[cid].models || {}).forEach(id => html += `<option value="${id}">${appData.brands[bid].categories[cid].models[id].name}</option>`);
        div.innerHTML = html + `</select>`;
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    // --- 9. CÁLCULO DE ESTADÍSTICAS ---
    function updateStats() {
        let total = 0, low = 0, invest = 0, profit = 0;
        Object.values(appData.brands || {}).forEach(b => {
            Object.values(b.categories || {}).forEach(c => {
                Object.values(c.models || {}).forEach(m => {
                    Object.values(m.stock || {}).forEach(s => {
                        const qty = s.qty || 0;
                        const pc = s.pc || 0;
                        const pv = s.pv || 0;
                        
                        total += qty;
                        invest += (qty * pc);
                        profit += (qty * (pv - pc)); // Beneficio = Unidades * (Venta - Compra)
                        
                        if(qty <= 2) low++;
                    });
                });
            });
        });
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-low').innerText = low;
        document.getElementById('stat-investment').innerText = invest.toFixed(2) + '€';
        document.getElementById('stat-profit').innerText = profit.toFixed(2) + '€';
    }
</script>
</body>
</html>
